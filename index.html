<!DOCTYPE html>
<html>
<head>
  <title>Travel Explorer 🌍</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #map {
      width: 100%;
    }

    #panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100%;
      background: #111;
      color: white;
      padding: 20px;
      transition: 0.3s;
      overflow-y: auto;
    }

    #panel.active {
      right: 0;
    }

    h2 {
      margin-top: 0;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      margin: 10px 0;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .close {
      cursor: pointer;
      float: right;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <span class="close" onclick="closePanel()">❌</span>
  <h2 id="placeName">📍 Location</h2>

  <div class="card">
    <h3>🤖 AI Suggestions</h3>
    <p id="ai"></p>
  </div>

  <div class="card">
    <h3>🚗 How to Reach</h3>
    <p id="route"></p>
  </div>

  <div class="card">
    <h3>🎥 Travel Vlogs</h3>
    <div id="videos"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([20.5937, 78.9629], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let marker;

  map.on('click', async function(e) {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);

    const place = await getPlaceName(lat, lng);

    document.getElementById("placeName").innerText = "📍 " + place;

    document.getElementById("ai").innerText = generateAI(place);
    document.getElementById("route").innerText = getRoute(place);

    loadVideos(place);

    openPanel();
  });

  function openPanel() {
    document.getElementById("panel").classList.add("active");
  }

  function closePanel() {
    document.getElementById("panel").classList.remove("active");
  }

  async function getPlaceName(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
      );
      const data = await res.json();

      return data.address.city ||
             data.address.town ||
             data.address.village ||
             data.address.state ||
             "Unknown Place";

    } catch {
      return "Unknown Place";
    }
  }

  function generateAI(place) {
    if (place.toLowerCase().includes("mumbai")) {
      return "Best time: evening 🌇. Try street food and Marine Drive.";
    }

    if (place.toLowerCase().includes("goa")) {
      return "Perfect for beaches 🏖️ and nightlife. Rent a bike!";
    }

    return "Explore local culture, try nearby food spots 🍜, and visit during sunrise or sunset.";
  }

  function getRoute(place) {
    return "🚆 Train + 🚕 Cab recommended for " + place + ". Cheapest & reliable.";
  }

  function loadVideos(place) {
    const container = document.getElementById("videos");
    container.innerHTML = "";

    const queries = [
      place + " travel vlog",
      place + " tourism",
      place + " places to visit"
    ];

    queries.forEach(q => {
      const iframe = document.createElement("iframe");
      iframe.src =
        "https://www.youtube.com/embed?listType=search&list=" + encodeURIComponent(q);
      iframe.allowFullscreen = true;
      container.appendChild(iframe);
    });
  }
</script>

</body>
</html>
