<!DOCTYPE html>
<html>
<head>
  <title>Travel Explorer 🌍</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #panel {
      position: fixed;
      top: 0;
      right: -350px;
      width: 350px;
      height: 100%;
      background: #121212;
      color: white;
      padding: 20px;
      transition: 0.3s;
      overflow-y: auto;
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }

    #panel.active {
      right: 0;
    }

    .close {
      cursor: pointer;
      float: right;
      font-size: 18px;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    a {
      color: orange;
      text-decoration: none;
      display: block;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <span class="close" onclick="closePanel()">❌</span>
  <h2 id="place">📍 Location</h2>

  <div class="card">
    <h3>🤖 Smart Suggestions</h3>
    <p id="ai"></p>
  </div>

  <div class="card">
    <h3>🚗 Travel Advice</h3>
    <p id="route"></p>
  </div>

  <div class="card">
    <h3>🎥 Travel Vlogs</h3>
    <div id="videos"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([20.5937, 78.9629], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

  let marker;

  map.on('click', async (e) => {
    const { lat, lng } = e.latlng;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);

    const place = await getPlace(lat, lng);

    document.getElementById("place").innerText = "📍 " + place;

    document.getElementById("ai").innerText = getAI(place);
    document.getElementById("route").innerText = getRoute(lat, lng);

    loadVideos(place);

    openPanel();
  });

  function openPanel() {
    document.getElementById("panel").classList.add("active");
  }

  function closePanel() {
    document.getElementById("panel").classList.remove("active");
  }

  async function getPlace(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
      );
      const data = await res.json();

      return data.address.city ||
             data.address.town ||
             data.address.village ||
             data.address.state ||
             "Unknown place";
    } catch {
      return "Unknown place";
    }
  }

  function getAI(place) {
    place = place.toLowerCase();

    if (place.includes("goa"))
      return "Beach destination 🏖️. Best in winter. Try renting a bike.";

    if (place.includes("mumbai"))
      return "Urban city 🌆. Visit Marine Drive at night and try street food.";

    return "Explore local culture, check food spots, and visit during sunrise/sunset.";
  }

  function getRoute(lat, lng) {
    return `Use Google Maps for best route:
https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  }

  function loadVideos(place) {
    const container = document.getElementById("videos");
    container.innerHTML = "";

    const queries = [
      "travel vlog",
      "tourism",
      "places to visit"
    ];

    queries.forEach(q => {
      const link = document.createElement("a");
      link.href = `https://www.youtube.com/results?search_query=${encodeURIComponent(place + " " + q)}`;
      link.target = "_blank";
      link.innerText = `▶ ${place} ${q}`;

      container.appendChild(link);
    });
  }
</script>

</body>
</html>
